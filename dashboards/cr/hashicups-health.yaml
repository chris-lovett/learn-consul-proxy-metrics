    : false,\n        \"multi\": false,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"app\",\n        \"label\": \"Application\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(envoy_cluster_upstream_rq_total{namespace=\\\"$namespace\\\", datacenter=~\\\"$datacenter\\\"}, app)\",\n        \"query\": { \"query\": \"label_values(envoy_cluster_upstream_rq_total{namespace=\\\"$namespace\\\", datacenter=~\\\"$datacenter\\\"}, app)\", \"refId\": \"StandardVariableQuery\" },\n        \"includeAll\": true,\n        \"allValue\": \"frontend|nginx|payments|product-api|product-api-db|public-api\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n\
