    \    ]\n    },\n    {\n      \"id\": 2, \"type\": \"stat\", \"title\": \"Overall 5xx Error Rate\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 6, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"percent\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"yellow\", \"value\": 1 }, { \"color\": \"red\", \"value\": 5 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"100 * sum(rate(envoy_cluster_upstream_rq_5xx{namespace=\\\"$namespace\\\", datacenter=~\\\
