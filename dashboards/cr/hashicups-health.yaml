    : 1, \"fillOpacity\": 10 }, \"unit\": \"reqps\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (app) (rate(envoy_cluster_upstream_rq_total{namespace=\\\"$namespace\\\", datacenter=~\\\"$datacenter\\\", app=~\\\"$app\\\"}[5m]))\",\n          \"legendFormat\": \"{{app}}\" }\n      ]\n    },\n    {\n      \"id\": 20, \"type\": \"row\", \"title\": \"Error Rate & Latency\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 13 }\n    },\n    {\n      \"id\": 21, \"type\": \"timeseries\", \"title\": \"5xx Error Rate by Service (%)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 14 },\n\
