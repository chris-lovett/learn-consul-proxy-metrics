  json: "{\n  \"title\": \"HashiCups Service Health\",\n  \"uid\": \"platform-hashicups-health\",\n  \"description\": \"HashiCups inter-service traffic, error rates, latency, upstream connections, and circuit breaker status\",\n  \"tags\": [\"hashicups\", \"envoy\", \"service-mesh\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"30s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-1h\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datacenter\",\n        \"label\": \"Datacenter\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(envoy_cluster_upstream_rq_total{app=~\\\"frontend|nginx|payments|product-api|product-api-db|public-api\\\"}, datacenter)\",\n        \"query\": { \"query\": \"label_values(envoy_cluster_upstream_rq_total{app=~\\\
