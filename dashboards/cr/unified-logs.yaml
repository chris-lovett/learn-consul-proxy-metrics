apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: unified-logs
  namespace: monitoring
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Platform
  json: "{\n  \"title\": \"Unified Logs\",\n  \"uid\": \"platform-unified-logs\",\n  \"description\": \"Single-pane log viewer: Consul server logs, gateway logs, and application logs \u2014 all with datacenter and resource selectors\",\n  \"tags\": [\"loki\", \"logs\", \"consul\", \"gateway\", \"hashicups\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"30s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-30m\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"server_datacenter\",\n        \"label\": \"Server DC\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\"\
    : \"All\", \"value\": \"$__all\", \"selected\": true },\n          { \"text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"server_pod\",\n        \"label\": \"Server Pod\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n        \"definition\": \"label_values({namespace=\\\"consul\\\", pod=~\\\"consul-server-.*\\\", datacenter=~\\\"$server_datacenter\\\"}, pod)\",\n        \"query\": \"label_values({namespace=\\\"consul\\\", pod=~\\\"consul-server-.*\\\", datacenter=~\\\"$server_datacenter\\\"}, pod)\",\n        \"includeAll\": true,\n        \"allValue\": \"consul-server-.*\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"server_level\",\n        \"label\"\
    : \"Server Log Level\",\n        \"type\": \"custom\",\n        \"query\": \"ALL : [,INFO : [INFO],WARN : [WARN],ERROR : [ERROR],DEBUG : [DEBUG]\",\n        \"includeAll\": false,\n        \"multi\": false,\n        \"hide\": 0,\n        \"current\": { \"text\": \"ALL\", \"value\": \"[\", \"selected\": true },\n        \"options\": [\n          { \"text\": \"ALL\",   \"value\": \"[\",      \"selected\": true  },\n          { \"text\": \"INFO\",  \"value\": \"[INFO]\", \"selected\": false },\n          { \"text\": \"WARN\",  \"value\": \"[WARN]\", \"selected\": false },\n          { \"text\": \"ERROR\", \"value\": \"[ERROR]\",\"selected\": false },\n          { \"text\": \"DEBUG\", \"value\": \"[DEBUG]\",\"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"gw_datacenter\",\n        \"label\": \"Gateway DC\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n\
    \        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\": true },\n          { \"text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"gateway_type\",\n        \"label\": \"Gateway Type\",\n        \"type\": \"custom\",\n        \"query\": \"api-gateway,mesh-gateway,terminating-gateway\",\n        \"includeAll\": true,\n        \"allValue\": \".*gateway.*\",\n        \"multi\": false,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \".*gateway.*\" },\n        \"options\": [\n          { \"text\": \"All\",                 \"value\": \".*gateway.*\",         \"selected\": true },\n          { \"text\": \"API Gateway\",         \"value\": \"api-gateway\",         \"selected\": false },\n          { \"\
    text\": \"Mesh Gateway\",        \"value\": \"mesh-gateway\",        \"selected\": false },\n          { \"text\": \"Terminating Gateway\", \"value\": \"terminating-gateway\", \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"app_datacenter\",\n        \"label\": \"App DC\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\": true },\n          { \"text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"app\",\n        \"label\": \"Application\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n\
    \        \"definition\": \"label_values({datacenter=~\\\"$app_datacenter\\\", app=~\\\"frontend|nginx|payments|product-api|product-api-db|public-api\\\"}, app)\",\n        \"query\": \"label_values({datacenter=~\\\"$app_datacenter\\\", app=~\\\"frontend|nginx|payments|product-api|product-api-db|public-api\\\"}, app)\",\n        \"includeAll\": true,\n        \"allValue\": \"frontend|nginx|payments|product-api|product-api-db|public-api\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"container\",\n        \"label\": \"Container\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n        \"definition\": \"label_values({datacenter=~\\\"$app_datacenter\\\", app=~\\\"$app\\\"}, container)\",\n        \"query\": \"label_values({datacenter=~\\\"$app_datacenter\\\", app=~\\\"$app\\\"}, container)\",\n\
    \        \"includeAll\": true,\n        \"allValue\": \".+\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 100, \"type\": \"row\", \"title\": \"Consul Server Logs  [ DC: $server_datacenter | Pod: $server_pod | Level: $server_level ]\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 0 }\n    },\n    {\n      \"id\": 101, \"type\": \"timeseries\", \"title\": \"Server Log Volume by Level\",\n      \"gridPos\": { \"h\": 6, \"w\": 24, \"x\": 0, \"y\": 1 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": [\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"ERROR\" },\
    \ \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"red\", \"mode\": \"fixed\" } }] },\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"WARN\" },  \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"orange\", \"mode\": \"fixed\" } }] },\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"INFO\" },  \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"green\", \"mode\": \"fixed\" } }] }\n        ]\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server_pod\\\", datacenter=~\\\"$server_datacenter\\\"} |~ \\\"(?i)\\\\\\\\[ERROR\\\\\\\\]|level=error\\\" [$__interval]))\"\
    ,\n          \"legendFormat\": \"ERROR\" },\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"B\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server_pod\\\", datacenter=~\\\"$server_datacenter\\\"} |~ \\\"(?i)\\\\\\\\[WARN\\\\\\\\]|level=warn\\\" [$__interval]))\",\n          \"legendFormat\": \"WARN\" },\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"C\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server_pod\\\", datacenter=~\\\"$server_datacenter\\\"} |~ \\\"(?i)\\\\\\\\[INFO\\\\\\\\]|level=info\\\" [$__interval]))\",\n          \"legendFormat\": \"INFO\" }\n      ]\n    },\n    {\n      \"id\": 102, \"type\": \"logs\", \"title\": \"Consul Server Log Stream\",\n      \"gridPos\": { \"h\": 18, \"w\": 24, \"x\": 0, \"y\": 7 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": []\
    \ },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": false,\n        \"showCommonLabels\": false,\n        \"showLabels\": true,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{namespace=\\\"consul\\\", pod=~\\\"$server_pod\\\", datacenter=~\\\"$server_datacenter\\\"} |= \\\"$server_level\\\"\",\n          \"maxLines\": 500,\n          \"legendFormat\": \"\" }\n      ]\n    },\n    {\n      \"id\": 200, \"type\": \"row\", \"title\": \"Gateway Logs  [ DC: $gw_datacenter | Type: $gateway_type ]\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 25 }\n    },\n    {\n      \"id\": 201, \"type\": \"logs\", \"title\": \"Gateway Log Stream\",\n      \"gridPos\": { \"h\": 18, \"\
    w\": 24, \"x\": 0, \"y\": 26 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": [] },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": false,\n        \"showCommonLabels\": false,\n        \"showLabels\": true,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{namespace=\\\"consul\\\", datacenter=~\\\"$gw_datacenter\\\", gateway_name=~\\\"$gateway_type\\\"} or {namespace=\\\"consul\\\", datacenter=~\\\"$gw_datacenter\\\", container=~\\\".*$gateway_type.*\\\"}\",\n          \"maxLines\": 500,\n          \"legendFormat\": \"\" }\n      ]\n    },\n    {\n      \"id\": 300, \"type\": \"row\", \"title\": \"Application Logs  [ DC: $app_datacenter\
    \ | App: $app | Container: $container ]\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 44 }\n    },\n    {\n      \"id\": 301, \"type\": \"timeseries\", \"title\": \"App Log Volume by App\",\n      \"gridPos\": { \"h\": 6, \"w\": 24, \"x\": 0, \"y\": 45 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (app) (rate({datacenter=~\\\"$app_datacenter\\\", app=~\\\"$app\\\", container=~\\\
    \"$container\\\"} [$__interval]))\",\n          \"legendFormat\": \"{{app}}\" }\n      ]\n    },\n    {\n      \"id\": 302, \"type\": \"logs\", \"title\": \"Application Log Stream\",\n      \"gridPos\": { \"h\": 18, \"w\": 24, \"x\": 0, \"y\": 51 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": [] },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": false,\n        \"showCommonLabels\": false,\n        \"showLabels\": true,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{datacenter=~\\\"$app_datacenter\\\", app=~\\\"$app\\\", container=~\\\"$container\\\"}\",\n          \"maxLines\": 500,\n          \"legendFormat\": \"\" }\n\
    \      ]\n    }\n  ]\n}"
