apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: consul-servers
  namespace: monitoring
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Platform
  json: "{\n  \"title\": \"Consul Servers\",\n  \"uid\": \"platform-consul-servers\",\n  \"description\": \"Per-datacenter Consul server health: autopilot, Raft, RPC query performance, runtime, and cluster peering\",\n  \"tags\": [\"consul\", \"servers\", \"raft\", \"peering\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"30s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-1h\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datacenter\",\n        \"label\": \"Datacenter\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(up{job=\\\"consul-servers\\\"}, datacenter)\",\n        \"query\": { \"query\": \"label_values(up{job=\\\"consul-servers\\\"}, datacenter)\", \"refId\": \"StandardVariableQuery\"\
    \ },\n        \"includeAll\": true,\n        \"allValue\": \".*\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"pod\",\n        \"label\": \"Server Pod\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(up{job=\\\"consul-servers\\\", datacenter=~\\\"$datacenter\\\"}, pod)\",\n        \"query\": { \"query\": \"label_values(up{job=\\\"consul-servers\\\", datacenter=~\\\"$datacenter\\\"}, pod)\", \"refId\": \"StandardVariableQuery\" },\n        \"includeAll\": true,\n        \"allValue\": \".*\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1, \"type\": \"stat\", \"title\": \"Consul\
    \ Servers Up\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 0, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": { \"mode\": \"thresholds\" },\n          \"mappings\": [{ \"type\": \"value\", \"options\": { \"0\": { \"text\": \"DOWN\", \"color\": \"red\", \"index\": 0 } } }],\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"red\", \"value\": null }, { \"color\": \"green\", \"value\": 1 }] }\n        },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum(up{job=\\\"consul-servers\\\", datacenter=~\\\"$datacenter\\\"} == 1) or\
    \ vector(0)\",\n          \"instant\": true, \"legendFormat\": \"Servers Up\" }\n      ]\n    },\n    {\n      \"id\": 2, \"type\": \"stat\", \"title\": \"Autopilot Healthy\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 6, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"color\": { \"mode\": \"thresholds\" },\n          \"mappings\": [{ \"type\": \"value\", \"options\": {\n            \"0\": { \"text\": \"UNHEALTHY\", \"color\": \"red\", \"index\": 0 },\n            \"1\": { \"text\": \"HEALTHY\", \"color\": \"green\", \"index\": 1 }\n          }}],\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"red\", \"value\": null }, { \"color\": \"green\", \"value\": 1 }] }\n        },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"],\
    \ \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"min(consul_autopilot_healthy{datacenter=~\\\"$datacenter\\\"}) or vector(0)\",\n          \"instant\": true, \"legendFormat\": \"Autopilot\" }\n      ]\n    },\n    {\n      \"id\": 3, \"type\": \"stat\", \"title\": \"LAN Members\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 12, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"blue\", \"value\": null }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\":\
    \ [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum(max by(datacenter)(consul_members_servers{datacenter=~\\\"$datacenter\\\"}))\",\n          \"instant\": true, \"legendFormat\": \"Servers\" },\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"B\",\n          \"expr\": \"sum(max by(datacenter)(consul_members_clients{datacenter=~\\\"$datacenter\\\"}))\",\n          \"instant\": true, \"legendFormat\": \"Clients\" }\n      ]\n    },\n    {\n      \"id\": 4, \"type\": \"stat\", \"title\": \"Registered Services\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 18, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"blue\", \"value\": null }] } },\n\
    \        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum(max by(datacenter)(consul_state_service_instances{datacenter=~\\\"$datacenter\\\",partition=\\\"default\\\"})) - sum(max by(datacenter)(consul_members_servers{datacenter=~\\\"$datacenter\\\"})) - sum(max by(datacenter,kind)(consul_state_connect_instances{datacenter=~\\\"$datacenter\\\",partition=\\\"default\\\",kind=~\\\"api-gateway|mesh-gateway|ingress-gateway|terminating-gateway\\\"}))\",\n          \"instant\": true, \"legendFormat\": \"Services\" }\n      ]\n    },\n    {\n      \"id\": 10, \"type\": \"row\", \"title\": \"Raft Health\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 4 }\n\
    \    },\n    {\n      \"id\": 11, \"type\": \"timeseries\", \"title\": \"Raft Applied vs Last Index\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 5 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10, \"spanNulls\": false } },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"max by (datacenter, pod) (consul_raft_applied_index{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"})\",\n          \"legendFormat\": \"Applied Index ({{datacenter}}/{{pod}})\"\
    \ },\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"B\",\n          \"expr\": \"max by (datacenter, pod) (consul_raft_last_index{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"})\",\n          \"legendFormat\": \"Last Index ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 12, \"type\": \"timeseries\", \"title\": \"Raft Commit Time & Leader Last Contact\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 5 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"ms\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\"\
    \ }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"1000 * sum by (datacenter, pod) (rate(consul_raft_commitTime_sum{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"}[5m])) / clamp_min(sum by (datacenter, pod) (rate(consul_raft_commitTime_count{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"}[5m])), 1)\",\n          \"legendFormat\": \"Avg Commit Time ms ({{datacenter}}/{{pod}})\" },\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"B\",\n          \"expr\": \"1000 * max by (datacenter, pod) (consul_raft_leader_lastContact{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\", quantile=\\\"0.99\\\"})\",\n          \"legendFormat\": \"Leader Last Contact P99 ms ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 20, \"type\": \"row\", \"title\": \"Query & RPC Health\",\n      \"collapsed\": false, \"gridPos\"\
    : { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 13 }\n    },\n    {\n      \"id\": 21, \"type\": \"timeseries\", \"title\": \"Consul RPC Request Rate\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 14 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"reqps\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (datacenter, pod) (rate(consul_client_rpc{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"}[5m]))\",\n          \"legendFormat\"\
    : \"RPC Rate ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 22, \"type\": \"timeseries\", \"title\": \"Catalog API Operations\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 14 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"ops\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (datacenter, pod) (rate(consul_client_api_success_catalog_register{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"}[5m]))\"\
    ,\n          \"legendFormat\": \"Register ({{datacenter}}/{{pod}})\" },\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"B\",\n          \"expr\": \"sum by (datacenter, pod) (rate(consul_client_api_success_catalog_deregister{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"}[5m]))\",\n          \"legendFormat\": \"Deregister ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 30, \"type\": \"row\", \"title\": \"Runtime\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 22 }\n    },\n    {\n      \"id\": 31, \"type\": \"timeseries\", \"title\": \"Consul Runtime Memory\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 23 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"bytes\"\
    \ },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"max by (datacenter, pod) (consul_runtime_alloc_bytes{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"})\",\n          \"legendFormat\": \"Heap Alloc ({{datacenter}}/{{pod}})\" },\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"B\",\n          \"expr\": \"max by (datacenter, pod) (consul_runtime_sys_bytes{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"})\",\n          \"legendFormat\": \"Sys Memory ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 32, \"type\": \"timeseries\", \"title\": \"Runtime Goroutines\"\
    ,\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 23 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"max by (datacenter, pod) (consul_runtime_num_goroutines{datacenter=~\\\"$datacenter\\\", pod=~\\\"$pod\\\"})\",\n          \"legendFormat\": \"Goroutines ({{datacenter}}/{{pod}})\" }\n      ]\n    },\n    {\n      \"id\": 40, \"type\": \"row\", \"title\": \"Cluster\
    \ Peering  (requires DC2 \u2192 DC1 remote_write)\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 31 }\n    },\n    {\n      \"id\": 41, \"type\": \"timeseries\", \"title\": \"Peering: Exported Services per DC\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 32 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (datacenter) (consul_peering_exported_services{datacenter=~\\\
    \"$datacenter\\\"})\",\n          \"legendFormat\": \"Exported Services ({{datacenter}})\" }\n      ]\n    },\n    {\n      \"id\": 42, \"type\": \"timeseries\", \"title\": \"Catalog Change Rate (Cross-DC Replication Indicator)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 32 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"ops\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (datacenter) (rate(consul_client_api_success_catalog_register{datacenter=~\\\
    \"$datacenter\\\"}[5m]) + rate(consul_client_api_success_catalog_deregister{datacenter=~\\\"$datacenter\\\"}[5m]))\",\n          \"legendFormat\": \"Catalog Ops/s ({{datacenter}})\" }\n      ]\n    }\n  ]\n}"
