apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: pod-health
  namespace: monitoring
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Platform
  json: "{\n  \"title\": \"Pod Health \u2014 Kubernetes\",\n  \"uid\": \"platform-pod-health\",\n  \"description\": \"Per-namespace/pod CPU, memory, restart counts, readiness, and network I/O\",\n  \"tags\": [\"kubernetes\", \"pods\", \"resources\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"30s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-1h\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datacenter\",\n        \"label\": \"Datacenter\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\": true },\n        \
    \  { \"text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"namespace\",\n        \"label\": \"Namespace\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(container_cpu_usage_seconds_total{container!=\\\"\\\", container!=\\\"POD\\\", datacenter=~\\\"$datacenter\\\"}, namespace)\",\n        \"query\": { \"query\": \"label_values(container_cpu_usage_seconds_total{container!=\\\"\\\", container!=\\\"POD\\\", datacenter=~\\\"$datacenter\\\"}, namespace)\", \"refId\": \"StandardVariableQuery\" },\n        \"includeAll\": false,\n        \"multi\": false,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"pod\",\n        \"label\": \"Pod\"\
    ,\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n        \"definition\": \"label_values(container_cpu_usage_seconds_total{namespace=\\\"$namespace\\\", container!=\\\"\\\", container!=\\\"POD\\\", datacenter=~\\\"$datacenter\\\"}, pod)\",\n        \"query\": { \"query\": \"label_values(container_cpu_usage_seconds_total{namespace=\\\"$namespace\\\", container!=\\\"\\\", container!=\\\"POD\\\", datacenter=~\\\"$datacenter\\\"}, pod)\", \"refId\": \"StandardVariableQuery\" },\n        \"includeAll\": true,\n        \"allValue\": \".*\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1, \"type\": \"stat\", \"title\": \"Running Pods\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 0, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\"\
    \ },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"blue\", \"value\": null }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"count(kube_pod_status_phase{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\", phase=\\\"Running\\\"} == 1) or vector(0)\",\n          \"instant\": true, \"legendFormat\": \"Running\" }\n      ]\n    },\n    {\n      \"id\": 2, \"type\": \"stat\", \"title\": \"Pending Pods\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 6, \"y\": 0 },\n      \"datasource\": { \"type\": \"\
    prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"yellow\", \"value\": 1 } ] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"count(kube_pod_status_phase{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\", phase=\\\"Pending\\\"} == 1) or vector(0)\",\n          \"instant\": true, \"legendFormat\": \"Pending\" }\n      ]\n    },\n    {\n      \"id\": 3, \"type\": \"stat\", \"title\": \"Failed Pods\",\n      \"gridPos\"\
    : { \"h\": 4, \"w\": 6, \"x\": 12, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"red\", \"value\": 1 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"count(kube_pod_status_phase{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\", phase=\\\"Failed\\\"} == 1) or vector(0)\",\n          \"instant\": true, \"legendFormat\": \"Failed\" }\n      ]\n    },\n    {\n  \
    \    \"id\": 4, \"type\": \"stat\", \"title\": \"Container Restarts (last 1h)\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 18, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"yellow\", \"value\": 1 }, { \"color\": \"red\", \"value\": 5 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"none\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum(increase(kube_pod_container_status_restarts_total{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\",\
    \ datacenter=~\\\"$datacenter\\\"}[1h]))\",\n          \"instant\": true, \"legendFormat\": \"Restarts\" }\n      ]\n    },\n    {\n      \"id\": 10, \"type\": \"row\", \"title\": \"CPU & Memory\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 4 }\n    },\n    {\n      \"id\": 11, \"type\": \"timeseries\", \"title\": \"CPU Usage by Pod (cores)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 5 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\", \"max\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n \
    \       { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\", container!=\\\"\\\", container!=\\\"POD\\\"}[5m]))\",\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    },\n    {\n      \"id\": 12, \"type\": \"timeseries\", \"title\": \"Memory Working Set by Pod\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 5 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"bytes\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\", \"max\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\"\
    : { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (container_memory_working_set_bytes{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\", container!=\\\"\\\", container!=\\\"POD\\\"})\",\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    },\n    {\n      \"id\": 20, \"type\": \"row\", \"title\": \"Pod Status & Restarts\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 13 }\n    },\n    {\n      \"id\": 21, \"type\": \"timeseries\", \"title\": \"Container Restarts Over Time\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 14 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\"\
    : 2, \"fillOpacity\": 20 }, \"unit\": \"short\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"max\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\"}[$__rate_interval]))\",\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    },\n    {\n      \"id\": 22, \"type\": \"timeseries\", \"title\": \"Pod Readiness (Ready Containers)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 14 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\"\
    : { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"red\", \"value\": null }, { \"color\": \"green\", \"value\": 1 }] } },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"none\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (kube_pod_container_status_ready{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\"})\",\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    },\n    {\n      \"id\": 30, \"type\": \"row\", \"title\": \"Network I/O\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0,\
    \ \"y\": 22 }\n    },\n    {\n      \"id\": 31, \"type\": \"timeseries\", \"title\": \"Network Receive by Pod (bytes/s)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 23 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"Bps\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (rate(container_network_receive_bytes_total{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\", datacenter=~\\\"$datacenter\\\"}[5m]))\"\
    ,\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    },\n    {\n      \"id\": 32, \"type\": \"timeseries\", \"title\": \"Network Transmit by Pod (bytes/s)\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 23 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"Bps\" },\n        \"overrides\": []\n      },\n      \"options\": {\n        \"legend\": { \"calcs\": [\"lastNotNull\", \"mean\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"prometheus\", \"uid\": \"PBFA97CFB590B2093\" }, \"refId\": \"A\",\n          \"expr\": \"sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\\\"$namespace\\\", pod=~\\\"$pod\\\
    \", datacenter=~\\\"$datacenter\\\"}[5m]))\",\n          \"legendFormat\": \"{{pod}}\" }\n      ]\n    }\n  ]\n}"
