apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: consul-logs
  namespace: monitoring
  labels:
    app: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: Platform
  json: "{\n  \"title\": \"Consul Server Logs\",\n  \"uid\": \"platform-consul-logs\",\n  \"description\": \"Consul server log volume, error/warn rates, and full log stream with level filtering\",\n  \"tags\": [\"loki\", \"logs\", \"consul\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"60s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-30m\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datacenter\",\n        \"label\": \"Datacenter\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\": true },\n          { \"\
    text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"server\",\n        \"label\": \"Server Pod\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n        \"definition\": \"label_values({namespace=\\\"consul\\\", pod=~\\\"consul-server-.*\\\", datacenter=~\\\"$datacenter\\\"}, pod)\",\n        \"query\": \"label_values({namespace=\\\"consul\\\", pod=~\\\"consul-server-.*\\\", datacenter=~\\\"$datacenter\\\"}, pod)\",\n        \"includeAll\": true,\n        \"allValue\": \"consul-server-.*\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"level\",\n        \"label\": \"Log Level\",\n        \"type\": \"custom\",\n        \"query\": \"ALL : [,INFO : [INFO],WARN\
    \ : [WARN],ERROR : [ERROR],DEBUG : [DEBUG]\",\n        \"includeAll\": false,\n        \"multi\": false,\n        \"hide\": 0,\n        \"current\": { \"text\": \"ALL\", \"value\": \"[\", \"selected\": true },\n        \"options\": [\n          { \"text\": \"ALL\",   \"value\": \"[\",      \"selected\": true  },\n          { \"text\": \"INFO\",  \"value\": \"[INFO]\", \"selected\": false },\n          { \"text\": \"WARN\",  \"value\": \"[WARN]\", \"selected\": false },\n          { \"text\": \"ERROR\", \"value\": \"[ERROR]\",\"selected\": false },\n          { \"text\": \"DEBUG\", \"value\": \"[DEBUG]\",\"selected\": false }\n        ]\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1, \"type\": \"stat\", \"title\": \"Consul Log Volume (lines/s)\",\n      \"gridPos\": { \"h\": 4, \"w\": 8, \"x\": 0, \"y\": 0 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" },\
    \ \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"blue\", \"value\": null }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"}[1m]))\",\n          \"legendFormat\": \"lines/s\" }\n      ]\n    },\n    {\n      \"id\": 2, \"type\": \"stat\", \"title\": \"WARN Rate (lines/s)\",\n      \"gridPos\": { \"h\": 4, \"w\": 8, \"x\": 8, \"y\": 0 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"\
    mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"yellow\", \"value\": 0.05 }, { \"color\": \"orange\", \"value\": 0.5 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"} |~ \\\"(?i)\\\\\\\\[WARN\\\\\\\\]|level=warn\\\" [1m]))\",\n          \"legendFormat\": \"warn/s\" }\n      ]\n    },\n    {\n      \"id\": 3, \"type\": \"stat\", \"title\": \"ERROR Rate (lines/s)\",\n      \"gridPos\": { \"h\": 4, \"w\": 8, \"x\": 16, \"y\": 0 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\"\
    : { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\": \"yellow\", \"value\": 0.01 }, { \"color\": \"red\", \"value\": 0.1 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"} |~ \\\"(?i)\\\\\\\\[ERROR\\\\\\\\]|level=error\\\" [1m]))\",\n          \"legendFormat\": \"errors/s\" }\n      ]\n    },\n    {\n      \"id\": 10, \"type\": \"row\", \"title\": \"Log Volume Over Time\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 4 }\n    },\n    {\n      \"\
    id\": 11, \"type\": \"timeseries\", \"title\": \"Consul Log Volume by Level\",\n      \"gridPos\": { \"h\": 8, \"w\": 24, \"x\": 0, \"y\": 5 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"palette-classic\" }, \"custom\": { \"lineWidth\": 1, \"fillOpacity\": 10 }, \"unit\": \"short\" },\n        \"overrides\": [\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"ERROR\" }, \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"red\", \"mode\": \"fixed\" } }] },\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"WARN\" },  \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"orange\", \"mode\": \"fixed\" } }] },\n          { \"matcher\": { \"id\": \"byName\", \"options\": \"INFO\" },  \"properties\": [{ \"id\": \"color\", \"value\": { \"fixedColor\": \"green\", \"mode\": \"fixed\" } }] }\n        ]\n      },\n      \"options\": {\n\
    \        \"legend\": { \"calcs\": [\"lastNotNull\"], \"displayMode\": \"list\", \"placement\": \"bottom\" },\n        \"tooltip\": { \"mode\": \"multi\", \"sort\": \"desc\" }\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"} |~ \\\"(?i)\\\\\\\\[ERROR\\\\\\\\]|level=error\\\" [$__interval]))\",\n          \"legendFormat\": \"ERROR\" },\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"B\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"} |~ \\\"(?i)\\\\\\\\[WARN\\\\\\\\]|level=warn\\\" [$__interval]))\",\n          \"legendFormat\": \"WARN\" },\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"C\",\n          \"expr\": \"sum(rate({namespace=\\\"consul\\\", pod=~\\\
    \"$server\\\", datacenter=~\\\"$datacenter\\\"} |~ \\\"(?i)\\\\\\\\[INFO\\\\\\\\]|level=info\\\" [$__interval]))\",\n          \"legendFormat\": \"INFO\" }\n      ]\n    },\n    {\n      \"id\": 20, \"type\": \"row\", \"title\": \"Consul Server Log Stream\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 13 }\n    },\n    {\n      \"id\": 21, \"type\": \"logs\", \"title\": \"Consul Server Logs\",\n      \"gridPos\": { \"h\": 18, \"w\": 24, \"x\": 0, \"y\": 14 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": [] },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": false,\n        \"showCommonLabels\": false,\n        \"showLabels\": true,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        { \"datasource\"\
    : { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{namespace=\\\"consul\\\", pod=~\\\"$server\\\", datacenter=~\\\"$datacenter\\\"} |= \\\"$level\\\"\",\n          \"maxLines\": 200,\n          \"legendFormat\": \"\" }\n      ]\n    }\n  ]\n}"
