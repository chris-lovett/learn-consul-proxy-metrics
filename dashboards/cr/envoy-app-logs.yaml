    : 1, \"w\": 24, \"x\": 0, \"y\": 13 }\n    },\n    {\n      \"id\": 21, \"type\": \"logs\", \"title\": \"HashiCups Pod Logs\",\n      \"gridPos\": { \"h\": 14, \"w\": 24, \"x\": 0, \"y\": 14 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": [] },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": false,\n        \"showCommonLabels\": false,\n        \"showLabels\": true,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": false\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{datacenter=~\\\"$datacenter\\\", namespace=~\\\"$namespace\\\", app=~\\\"frontend|nginx|payments|product-api|product-api-db|public-api\\\", pod=~\\\"$pod\\\"}\",\n          \"legendFormat\": \"\" }\n      ]\n  \
    \  },\n    {\n      \"id\": 30, \"type\": \"row\", \"title\": \"Envoy Access Logs (JSON parsed)\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 28 }\n    },\n    {\n      \"id\": 31, \"type\": \"logs\", \"title\": \"Envoy Access Logs\",\n      \"gridPos\": { \"h\": 14, \"w\": 24, \"x\": 0, \"y\": 29 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": { \"defaults\": {}, \"overrides\": [] },\n      \"options\": {\n        \"dedupStrategy\": \"none\",\n        \"enableLogDetails\": true,\n        \"prettifyLogMessage\": true,\n        \"showCommonLabels\": false,\n        \"showLabels\": false,\n        \"showTime\": true,\n        \"sortOrder\": \"Descending\",\n        \"wrapLogMessage\": true\n      },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"{datacenter=~\\\"$datacenter\\\", namespace=~\\\"$namespace\\\", container=\\\
    \"consul-dataplane\\\", pod=~\\\"$pod\\\"} | json | __error__=\\\"\\\"\",\n          \"legendFormat\": \"\" }\n      ]\n    }\n  ]\n}"
