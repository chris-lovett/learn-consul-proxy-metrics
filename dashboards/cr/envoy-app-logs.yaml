  json: "{\n  \"title\": \"Envoy & Application Logs\",\n  \"uid\": \"platform-envoy-app-logs\",\n  \"description\": \"HashiCups pod logs, Envoy access logs (JSON parsed), and log volume by pod\",\n  \"tags\": [\"loki\", \"logs\", \"hashicups\", \"envoy\", \"platform\"],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 38,\n  \"refresh\": \"15s\",\n  \"graphTooltip\": 1,\n  \"time\": { \"from\": \"now-30m\", \"to\": \"now\" },\n  \"timepicker\": {},\n  \"editable\": true,\n  \"id\": null,\n  \"links\": [],\n  \"version\": 1,\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\": \"datacenter\",\n        \"label\": \"Datacenter\",\n        \"type\": \"custom\",\n        \"query\": \"dc1,dc2\",\n        \"includeAll\": true,\n        \"allValue\": \"dc1|dc2\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"current\": { \"text\": \"All\", \"value\": \"$__all\" },\n        \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\": true },\n \
    \         { \"text\": \"dc1\", \"value\": \"dc1\",    \"selected\": false },\n          { \"text\": \"dc2\", \"value\": \"dc2\",    \"selected\": false }\n        ]\n      },\n      {\n        \"name\": \"namespace\",\n        \"label\": \"Namespace\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n        \"definition\": \"label_values({datacenter=~\\\"$datacenter\\\"}, namespace)\",\n        \"query\": \"label_values({datacenter=~\\\"$datacenter\\\"}, namespace)\",\n        \"includeAll\": true,\n        \"allValue\": \".+\",\n        \"multi\": false,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      },\n      {\n        \"name\": \"pod\",\n        \"label\": \"Pod\",\n        \"type\": \"query\",\n        \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n        \"definition\": \"label_values({datacenter=~\\\"$datacenter\\\", namespace=\\\
    \"$namespace\\\"}, pod)\",\n        \"query\": \"label_values({datacenter=~\\\"$datacenter\\\", namespace=\\\"$namespace\\\"}, pod)\",\n        \"includeAll\": true,\n        \"allValue\": \".+\",\n        \"multi\": true,\n        \"hide\": 0,\n        \"refresh\": 2,\n        \"sort\": 1,\n        \"current\": {},\n        \"options\": []\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 1, \"type\": \"stat\", \"title\": \"App Log Volume (lines/s)\",\n      \"gridPos\": { \"h\": 4, \"w\": 8, \"x\": 0, \"y\": 0 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"blue\", \"value\": null }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\"\
