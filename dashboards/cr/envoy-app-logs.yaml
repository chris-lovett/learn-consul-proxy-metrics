    : \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({datacenter=~\\\"$datacenter\\\", namespace=~\\\"$namespace\\\", app=~\\\"frontend|nginx|payments|product-api|product-api-db|public-api\\\", pod=~\\\"$pod\\\"} |~ \\\"(?i)(error|fatal|panic)\\\"[1m]))\",\n          \"legendFormat\": \"errors/s\" }\n      ]\n    },\n    {\n      \"id\": 3, \"type\": \"stat\", \"title\": \"Envoy 5xx Rate (lines/s)\",\n      \"gridPos\": { \"h\": 4, \"w\": 8, \"x\": 16, \"y\": 0 },\n      \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" },\n      \"fieldConfig\": {\n        \"defaults\": { \"color\": { \"mode\": \"thresholds\" }, \"unit\": \"short\",\n          \"thresholds\": { \"mode\": \"absolute\", \"steps\": [{ \"color\": \"green\", \"value\": null }, { \"color\"\
    : \"yellow\", \"value\": 0.05 }, { \"color\": \"red\", \"value\": 0.5 }] } },\n        \"overrides\": []\n      },\n      \"options\": { \"colorMode\": \"background\", \"graphMode\": \"area\", \"reduceOptions\": { \"calcs\": [\"lastNotNull\"], \"fields\": \"\", \"values\": false } },\n      \"targets\": [\n        { \"datasource\": { \"type\": \"loki\", \"uid\": \"LOKI_DC1\" }, \"refId\": \"A\",\n          \"expr\": \"sum(rate({datacenter=~\\\"$datacenter\\\", namespace=~\\\"$namespace\\\", container=\\\"consul-dataplane\\\", pod=~\\\"$pod\\\"} | json | response_code >= 500 [1m]))\",\n          \"legendFormat\": \"5xx/s\" }\n      ]\n    },\n    {\n      \"id\": 10, \"type\": \"row\", \"title\": \"Log Volume by Pod\",\n      \"collapsed\": false, \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 4 }\n    },\n    {\n      \"id\": 11, \"type\": \"timeseries\", \"title\": \"App Log Lines / Second by Pod\",\n      \"gridPos\": { \"h\": 8, \"w\": 24, \"x\": 0, \"y\": 5 },\n      \"datasource\"\
