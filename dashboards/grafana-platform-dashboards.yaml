          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(rate(envoy_http_downstream_rq_total{job=\"consul-api-gateway\", datacenter=~\"$datacenter\"}[5m]))",
              "instant": true, "legendFormat": "RPS" }
          ]
        },
        {
          "id": 2, "type": "stat", "title": "API GW 5xx Error Rate",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "percent",
