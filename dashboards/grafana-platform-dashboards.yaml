# ─────────────────────────────────────────────────────────────────────────────
# 5. POD HEALTH — KUBERNETES
# ─────────────────────────────────────────────────────────────────────────────
# CPU/memory use cAdvisor metrics (always available via kubernetes-nodes-cadvisor
# scrape job bundled in the Prometheus Helm chart).
# Pod status/restart panels use kube-state-metrics (enabled by default in the
# Prometheus Helm chart; disable with kubeStateMetrics.enabled=false).
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-pod-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  pod-health.json: |-
    {
      "title": "Pod Health — Kubernetes",
      "uid": "platform-pod-health",
      "description": "Per-namespace/pod CPU, memory, restart counts, readiness, and network I/O",
      "tags": ["kubernetes", "pods", "resources", "platform"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "graphTooltip": 1,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "editable": true,
      "id": null,
      "links": [],
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "datacenter",
            "label": "Datacenter",
            "type": "custom",
            "query": "dc1,dc2",
            "includeAll": true,
            "allValue": "dc1|dc2",
            "multi": true,
            "hide": 0,
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "dc1", "value": "dc1",    "selected": false },
              { "text": "dc2", "value": "dc2",    "selected": false }
            ]
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\", datacenter=~\"$datacenter\"}, namespace)",
            "query": { "query": "label_values(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\", datacenter=~\"$datacenter\"}, namespace)", "refId": "StandardVariableQuery" },
            "includeAll": false,
            "multi": false,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\", datacenter=~\"$datacenter\"}, pod)",
            "query": { "query": "label_values(container_cpu_usage_seconds_total{namespace=\"$namespace\", container!=\"\", container!=\"POD\", datacenter=~\"$datacenter\"}, pod)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Running Pods",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\", phase=\"Running\"} == 1) or vector(0)",
              "instant": true, "legendFormat": "Running" }
          ]
        },
        {
          "id": 2, "type": "stat", "title": "Pending Pods",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 } ] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\", phase=\"Pending\"} == 1) or vector(0)",
              "instant": true, "legendFormat": "Pending" }
          ]
        },
        {
          "id": 3, "type": "stat", "title": "Failed Pods",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "count(kube_pod_status_phase{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\", phase=\"Failed\"} == 1) or vector(0)",
              "instant": true, "legendFormat": "Failed" }
          ]
        },
        {
          "id": 4, "type": "stat", "title": "Container Restarts (last 1h)",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\"}[1h]))",
              "instant": true, "legendFormat": "Restarts" }
          ]
        },
        {
          "id": 10, "type": "row", "title": "CPU & Memory",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 }
        },
        {
          "id": 11, "type": "timeseries", "title": "CPU Usage by Pod (cores)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean", "max"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 12, "type": "timeseries", "title": "Memory Working Set by Pod",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "bytes" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean", "max"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 20, "type": "row", "title": "Pod Status & Restarts",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 }
        },
        {
          "id": 21, "type": "timeseries", "title": "Container Restarts Over Time",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 2, "fillOpacity": 20 }, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\"}[$__rate_interval]))",
              "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 22, "type": "timeseries", "title": "Pod Readiness (Ready Containers)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] } },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (kube_pod_container_status_ready{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\"})",
              "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 30, "type": "row", "title": "Network I/O",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 }
        },
        {
          "id": 31, "type": "timeseries", "title": "Network Receive by Pod (bytes/s)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "Bps" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\"}[5m]))",
              "legendFormat": "{{pod}}" }
          ]
        },
        {
          "id": 32, "type": "timeseries", "title": "Network Transmit by Pod (bytes/s)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "Bps" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"$namespace\", pod=~\"$pod\", datacenter=~\"$datacenter\"}[5m]))",
              "legendFormat": "{{pod}}" }
          ]
        }
      ]
    }

---
# ─────────────────────────────────────────────────────────────────────────────
# 6. UNIFIED LOGS
# ─────────────────────────────────────────────────────────────────────────────
# Three sections in one dashboard:
#   Section 1 — Consul server logs  (datacenter + server pod selector)
#   Section 2 — Gateway logs        (datacenter + gateway type selector)
#   Section 3 — Application logs    (datacenter + app + container selector)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-unified-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  unified-logs.json: |-
    {
      "title": "Unified Logs",
      "uid": "platform-unified-logs",
      "description": "Single-pane log viewer: Consul server logs, gateway logs, and application logs — all with datacenter and resource selectors",
      "tags": ["loki", "logs", "consul", "gateway", "hashicups", "platform"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "graphTooltip": 1,
      "time": { "from": "now-30m", "to": "now" },
      "timepicker": {},
      "editable": true,
      "id": null,
      "links": [],
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "server_datacenter",
            "label": "Server DC",
            "type": "custom",
            "query": "dc1,dc2",
            "includeAll": true,
            "allValue": "dc1|dc2",
            "multi": true,
            "hide": 0,
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "dc1", "value": "dc1",    "selected": false },
              { "text": "dc2", "value": "dc2",    "selected": false }
            ]
          },
          {
            "name": "server_pod",
            "label": "Server Pod",
            "type": "query",
            "datasource": { "type": "loki", "uid": "LOKI_DC1" },
            "definition": "label_values({namespace=\"consul\", pod=~\"consul-server-.*\", datacenter=~\"$server_datacenter\"}, pod)",
            "query": "label_values({namespace=\"consul\", pod=~\"consul-server-.*\", datacenter=~\"$server_datacenter\"}, pod)",
            "includeAll": true,
            "allValue": "consul-server-.*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "server_level",
            "label": "Server Log Level",
            "type": "custom",
            "query": "ALL : [,INFO : [INFO],WARN : [WARN],ERROR : [ERROR],DEBUG : [DEBUG]",
            "includeAll": false,
            "multi": false,
            "hide": 0,
            "current": { "text": "ALL", "value": "[", "selected": true },
            "options": [
              { "text": "ALL",   "value": "[",      "selected": true  },
              { "text": "INFO",  "value": "[INFO]", "selected": false },
              { "text": "WARN",  "value": "[WARN]", "selected": false },
              { "text": "ERROR", "value": "[ERROR]","selected": false },
              { "text": "DEBUG", "value": "[DEBUG]","selected": false }
            ]
          },
          {
            "name": "gw_datacenter",
            "label": "Gateway DC",
            "type": "custom",
            "query": "dc1,dc2",
            "includeAll": true,
            "allValue": "dc1|dc2",
            "multi": true,
            "hide": 0,
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "dc1", "value": "dc1",    "selected": false },
              { "text": "dc2", "value": "dc2",    "selected": false }
            ]
          },
          {
            "name": "gateway_type",
            "label": "Gateway Type",
            "type": "custom",
            "query": "api-gateway,mesh-gateway,terminating-gateway",
            "includeAll": true,
            "allValue": ".*gateway.*",
            "multi": false,
            "hide": 0,
            "current": { "text": "All", "value": ".*gateway.*" },
            "options": [
              { "text": "All",                 "value": ".*gateway.*",         "selected": true },
              { "text": "API Gateway",         "value": "api-gateway",         "selected": false },
              { "text": "Mesh Gateway",        "value": "mesh-gateway",        "selected": false },
              { "text": "Terminating Gateway", "value": "terminating-gateway", "selected": false }
            ]
          },
          {
            "name": "app_datacenter",
            "label": "App DC",
            "type": "custom",
            "query": "dc1,dc2",
            "includeAll": true,
            "allValue": "dc1|dc2",
            "multi": true,
            "hide": 0,
            "current": { "text": "All", "value": "$__all" },
            "options": [
              { "text": "All", "value": "$__all", "selected": true },
              { "text": "dc1", "value": "dc1",    "selected": false },
              { "text": "dc2", "value": "dc2",    "selected": false }
            ]
          },
          {
            "name": "app",
            "label": "Application",
            "type": "query",
            "datasource": { "type": "loki", "uid": "LOKI_DC1" },
            "definition": "label_values({datacenter=~\"$app_datacenter\", app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, app)",
            "query": "label_values({datacenter=~\"$app_datacenter\", app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, app)",
            "includeAll": true,
            "allValue": "frontend|nginx|payments|product-api|product-api-db|public-api",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": { "type": "loki", "uid": "LOKI_DC1" },
            "definition": "label_values({datacenter=~\"$app_datacenter\", app=~\"$app\"}, container)",
            "query": "label_values({datacenter=~\"$app_datacenter\", app=~\"$app\"}, container)",
            "includeAll": true,
            "allValue": ".+",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          }
        ]
      },
      "panels": [
        {
          "id": 100, "type": "row", "title": "Consul Server Logs  [ DC: $server_datacenter | Pod: $server_pod | Level: $server_level ]",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 101, "type": "timeseries", "title": "Server Log Volume by Level",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 1 },
          "datasource": { "type": "loki", "uid": "LOKI_DC1" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "short" },
            "overrides": [
              { "matcher": { "id": "byName", "options": "ERROR" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "WARN" },  "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "INFO" },  "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] }
            ]
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "A",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server_pod\", datacenter=~\"$server_datacenter\"} |~ \"(?i)\\\\[ERROR\\\\]|level=error\" [$__interval]))",
              "legendFormat": "ERROR" },
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "B",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server_pod\", datacenter=~\"$server_datacenter\"} |~ \"(?i)\\\\[WARN\\\\]|level=warn\" [$__interval]))",
              "legendFormat": "WARN" },
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "C",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server_pod\", datacenter=~\"$server_datacenter\"} |~ \"(?i)\\\\[INFO\\\\]|level=info\" [$__interval]))",
              "legendFormat": "INFO" }
          ]
        },
        {
          "id": 102, "type": "logs", "title": "Consul Server Log Stream",
          "gridPos": { "h": 18, "w": 24, "x": 0, "y": 7 },
          "datasource": { "type": "loki", "uid": "LOKI_DC1" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "A",
              "expr": "{namespace=\"consul\", pod=~\"$server_pod\", datacenter=~\"$server_datacenter\"} |= \"$server_level\"",
              "maxLines": 500,
              "legendFormat": "" }
          ]
        },
        {
          "id": 200, "type": "row", "title": "Gateway Logs  [ DC: $gw_datacenter | Type: $gateway_type ]",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 }
        },
        {
          "id": 201, "type": "logs", "title": "Gateway Log Stream",
          "gridPos": { "h": 18, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "loki", "uid": "LOKI_DC1" },
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
