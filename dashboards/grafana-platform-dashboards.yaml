          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "A",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server\", datacenter=~\"$datacenter\"} |~ \"(?i)\\\\[WARN\\\\]|level=warn\" [1m]))",
              "legendFormat": "warn/s" }
          ]
        },
        {
          "id": 3, "type": "stat", "title": "ERROR Rate (lines/s)",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "loki", "uid": "LOKI_DC1" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "short",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 0.01 }, { "color": "red", "value": 0.1 }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "A",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server\", datacenter=~\"$datacenter\"} |~ \"(?i)\\\\[ERROR\\\\]|level=error\" [1m]))",
              "legendFormat": "errors/s" }
