            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "max"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (app) (envoy_cluster_outlier_detection_ejections_active{namespace=\"$namespace\", datacenter=~\"$datacenter\", app=~\"$app\"})",
