# =============================================================================
# Grafana Platform Dashboards - BofA / Consul on EKS
# =============================================================================
# Five dashboards deployed as ConfigMaps; the Grafana sidecar auto-provisions
# anything labelled grafana_dashboard="1".
#
# Dashboards:
#   1. Consul Servers        – per-DC, Raft, autopilot, RPC, peering
#   2. HashiCups Health      – service traffic, errors, latency, circuit breakers
#   3. Application & Consul Logs – HashiCups, Consul, and Envoy access logs
#   4. Gateway Health        – API GW, Terminating GW, Mesh GW
#   5. Pod Health            – Kubernetes CPU, memory, restarts, network
#
# Data sources (must match grafana-values.yaml):
#   Prometheus  uid: PBFA97CFB590B2093  (Prometheus-dc1)
#   Loki        uid: LOKI_DC1           (Loki-dc1)
#
# Notes:
#   - Dashboard 1 "Consul Servers" replaces the old platform-consul-health.
#   - Dashboard 2 replaces platform-hashicups-overview.
#   - Dashboard 3 replaces platform-envoy-pod-logs-v2.
#   - Dashboards 4 & 5 are new. Delete the three old ConfigMaps after apply:
#       kubectl delete cm grafana-dashboard-consul-health \
#                         grafana-dashboard-hashicups-overview \
#                         grafana-dashboard-envoy-access-logs \
#                         -n monitoring
#   - Peering panels require DC2 remote_write to DC1 Prometheus to show data.
#   - Pod status panels (phase/restarts) require kube-state-metrics, which the
#     default Prometheus Helm chart enables; disable flag: kubeStateMetrics.enabled.
# =============================================================================

---
# ─────────────────────────────────────────────────────────────────────────────
# 1. CONSUL SERVERS
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-consul-servers
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  consul-servers.json: |-
    {
      "title": "Consul Servers",
      "uid": "platform-consul-servers",
      "description": "Per-datacenter Consul server health: autopilot, Raft, RPC query performance, runtime, and cluster peering",
      "tags": ["consul", "servers", "raft", "peering", "platform"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "graphTooltip": 1,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "editable": true,
      "id": null,
      "links": [],
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "datacenter",
            "label": "Datacenter",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(up{job=\"consul-servers\"}, datacenter)",
            "query": { "query": "label_values(up{job=\"consul-servers\"}, datacenter)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "pod",
            "label": "Server Pod",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(up{job=\"consul-servers\", datacenter=~\"$datacenter\"}, pod)",
            "query": { "query": "label_values(up{job=\"consul-servers\", datacenter=~\"$datacenter\"}, pod)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Consul Servers Up",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [{ "type": "value", "options": { "0": { "text": "DOWN", "color": "red", "index": 0 } } }],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(up{job=\"consul-servers\", datacenter=~\"$datacenter\"} == 1) or vector(0)",
              "instant": true, "legendFormat": "Servers Up" }
          ]
        },
        {
          "id": 2, "type": "stat", "title": "Autopilot Healthy",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [{ "type": "value", "options": {
                "0": { "text": "UNHEALTHY", "color": "red", "index": 0 },
                "1": { "text": "HEALTHY", "color": "green", "index": 1 }
              }}],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 1 }] }
            },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "min(consul_autopilot_healthy{datacenter=~\"$datacenter\"}) or vector(0)",
              "instant": true, "legendFormat": "Autopilot" }
          ]
        },
        {
          "id": 3, "type": "stat", "title": "LAN Members",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(max by(datacenter)(consul_members_servers{datacenter=~\"$datacenter\"}))",
              "instant": true, "legendFormat": "Servers" },
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "B",
              "expr": "sum(max by(datacenter)(consul_members_clients{datacenter=~\"$datacenter\"}))",
              "instant": true, "legendFormat": "Clients" }
          ]
        },
        {
          "id": 4, "type": "stat", "title": "Registered Services",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(max by(datacenter)(consul_state_service_instances{datacenter=~\"$datacenter\",partition=\"default\"})) - sum(max by(datacenter)(consul_members_servers{datacenter=~\"$datacenter\"})) - sum(max by(datacenter,kind)(consul_state_connect_instances{datacenter=~\"$datacenter\",partition=\"default\",kind=~\"api-gateway|mesh-gateway|ingress-gateway|terminating-gateway\"}))",
              "instant": true, "legendFormat": "Services" }
          ]
        },
        {
          "id": 10, "type": "row", "title": "Raft Health",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 }
        },
        {
          "id": 11, "type": "timeseries", "title": "Raft Applied vs Last Index",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10, "spanNulls": false } },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "max by (datacenter, pod) (consul_raft_applied_index{datacenter=~\"$datacenter\", pod=~\"$pod\"})",
              "legendFormat": "Applied Index ({{datacenter}}/{{pod}})" },
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "B",
              "expr": "max by (datacenter, pod) (consul_raft_last_index{datacenter=~\"$datacenter\", pod=~\"$pod\"})",
              "legendFormat": "Last Index ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 12, "type": "timeseries", "title": "Raft Commit Time & Leader Last Contact",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "ms" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "1000 * sum by (datacenter, pod) (rate(consul_raft_commitTime_sum{datacenter=~\"$datacenter\", pod=~\"$pod\"}[5m])) / clamp_min(sum by (datacenter, pod) (rate(consul_raft_commitTime_count{datacenter=~\"$datacenter\", pod=~\"$pod\"}[5m])), 1)",
              "legendFormat": "Avg Commit Time ms ({{datacenter}}/{{pod}})" },
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "B",
              "expr": "1000 * max by (datacenter, pod) (consul_raft_leader_lastContact{datacenter=~\"$datacenter\", pod=~\"$pod\", quantile=\"0.99\"})",
              "legendFormat": "Leader Last Contact P99 ms ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 20, "type": "row", "title": "Query & RPC Health",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 }
        },
        {
          "id": 21, "type": "timeseries", "title": "Consul RPC Request Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (datacenter, pod) (rate(consul_client_rpc{datacenter=~\"$datacenter\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "RPC Rate ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 22, "type": "timeseries", "title": "Catalog API Operations",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "ops" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (datacenter, pod) (rate(consul_client_api_success_catalog_register{datacenter=~\"$datacenter\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "Register ({{datacenter}}/{{pod}})" },
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "B",
              "expr": "sum by (datacenter, pod) (rate(consul_client_api_success_catalog_deregister{datacenter=~\"$datacenter\", pod=~\"$pod\"}[5m]))",
              "legendFormat": "Deregister ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 30, "type": "row", "title": "Runtime",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 22 }
        },
        {
          "id": 31, "type": "timeseries", "title": "Consul Runtime Memory",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "bytes" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "max by (datacenter, pod) (consul_runtime_alloc_bytes{datacenter=~\"$datacenter\", pod=~\"$pod\"})",
              "legendFormat": "Heap Alloc ({{datacenter}}/{{pod}})" },
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "B",
              "expr": "max by (datacenter, pod) (consul_runtime_sys_bytes{datacenter=~\"$datacenter\", pod=~\"$pod\"})",
              "legendFormat": "Sys Memory ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 32, "type": "timeseries", "title": "Runtime Goroutines",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 23 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull", "mean"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "max by (datacenter, pod) (consul_runtime_num_goroutines{datacenter=~\"$datacenter\", pod=~\"$pod\"})",
              "legendFormat": "Goroutines ({{datacenter}}/{{pod}})" }
          ]
        },
        {
          "id": 40, "type": "row", "title": "Cluster Peering  (requires DC2 → DC1 remote_write)",
          "collapsed": false, "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 }
        },
        {
          "id": 41, "type": "timeseries", "title": "Peering: Exported Services per DC",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "short" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (datacenter) (consul_peering_exported_services{datacenter=~\"$datacenter\"})",
              "legendFormat": "Exported Services ({{datacenter}})" }
          ]
        },
        {
          "id": 42, "type": "timeseries", "title": "Catalog Change Rate (Cross-DC Replication Indicator)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "palette-classic" }, "custom": { "lineWidth": 1, "fillOpacity": 10 }, "unit": "ops" },
            "overrides": []
          },
          "options": {
            "legend": { "calcs": ["lastNotNull"], "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi", "sort": "none" }
          },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum by (datacenter) (rate(consul_client_api_success_catalog_register{datacenter=~\"$datacenter\"}[5m]) + rate(consul_client_api_success_catalog_deregister{datacenter=~\"$datacenter\"}[5m]))",
              "legendFormat": "Catalog Ops/s ({{datacenter}})" }
          ]
        }
      ]
    }

---
# ─────────────────────────────────────────────────────────────────────────────
# 2. HASHICUPS SERVICE HEALTH
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-hashicups-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  hashicups-health.json: |-
    {
      "title": "HashiCups Service Health",
      "uid": "platform-hashicups-health",
      "description": "HashiCups inter-service traffic, error rates, latency, upstream connections, and circuit breaker status",
      "tags": ["hashicups", "envoy", "service-mesh", "platform"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "graphTooltip": 1,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "editable": true,
      "id": null,
      "links": [],
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "datacenter",
            "label": "Datacenter",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(envoy_cluster_upstream_rq_total{app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, datacenter)",
            "query": { "query": "label_values(envoy_cluster_upstream_rq_total{app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, datacenter)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(envoy_cluster_upstream_rq_total{datacenter=~\"$datacenter\", app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, namespace)",
            "query": { "query": "label_values(envoy_cluster_upstream_rq_total{datacenter=~\"$datacenter\", app=~\"frontend|nginx|payments|product-api|product-api-db|public-api\"}, namespace)", "refId": "StandardVariableQuery" },
            "includeAll": false,
            "multi": false,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "app",
            "label": "Application",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(envoy_cluster_upstream_rq_total{namespace=\"$namespace\", datacenter=~\"$datacenter\"}, app)",
            "query": { "query": "label_values(envoy_cluster_upstream_rq_total{namespace=\"$namespace\", datacenter=~\"$datacenter\"}, app)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": "frontend|nginx|payments|product-api|product-api-db|public-api",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          }
        ]
      },
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Total RPS",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "reqps",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "area", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "sum(rate(envoy_cluster_upstream_rq_total{namespace=\"$namespace\", datacenter=~\"$datacenter\", app=~\"$app\"}[5m]))",
              "instant": true, "legendFormat": "RPS" }
          ]
        },
        {
          "id": 2, "type": "stat", "title": "Overall 5xx Error Rate",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "fieldConfig": {
            "defaults": { "color": { "mode": "thresholds" }, "unit": "percent",
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } },
            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
