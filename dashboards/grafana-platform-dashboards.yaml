            "overrides": []
          },
          "options": { "colorMode": "background", "graphMode": "none", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
          "targets": [
            { "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" }, "refId": "A",
              "expr": "100 * sum(rate(envoy_http_downstream_rq_5xx{job=\"consul-api-gateway\", datacenter=~\"$datacenter\"}[5m])) / clamp_min(sum(rate(envoy_http_downstream_rq_total{job=\"consul-api-gateway\", datacenter=~\"$datacenter\"}[5m])), 1)",
              "instant": true, "legendFormat": "Error %" }
          ]
        },
        {
          "id": 3, "type": "stat", "title": "API GW P99 Latency",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
