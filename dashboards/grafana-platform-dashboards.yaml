          "targets": [
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "A",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server\", datacenter=~\"$datacenter\"} |~ \"(?i)\\\\[ERROR\\\\]|level=error\" [$__interval]))",
              "legendFormat": "ERROR" },
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "B",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server\", datacenter=~\"$datacenter\"} |~ \"(?i)\\\\[WARN\\\\]|level=warn\" [$__interval]))",
              "legendFormat": "WARN" },
            { "datasource": { "type": "loki", "uid": "LOKI_DC1" }, "refId": "C",
              "expr": "sum(rate({namespace=\"consul\", pod=~\"$server\", datacenter=~\"$datacenter\"} |~ \"(?i)\\\\[INFO\\\\]|level=info\" [$__interval]))",
              "legendFormat": "INFO" }
          ]
