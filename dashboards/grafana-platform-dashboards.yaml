        },
        {
          "id": 2, "type": "stat", "title": "WARN Rate (lines/s)",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "loki", "uid": "LOKI_DC1" },
