# ─────────────────────────────────────────────────────────────────────────────
# 4. GATEWAY HEALTH
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gateway-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Platform
data:
  gateway-health.json: |-
    {
      "title": "Gateway Health",
      "uid": "platform-gateway-health",
      "description": "API Gateway, Terminating Gateway, and Mesh Gateway traffic, errors, latency, and connection health",
      "tags": ["consul", "gateway", "api-gateway", "mesh-gateway", "platform"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "graphTooltip": 1,
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "editable": true,
      "id": null,
      "links": [],
      "version": 1,
      "templating": {
        "list": [
          {
            "name": "datacenter",
            "label": "Datacenter",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(up{job=~\"consul-api-gateway|consul-mesh-gateway\"}, datacenter)",
            "query": { "query": "label_values(up{job=~\"consul-api-gateway|consul-mesh-gateway\"}, datacenter)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
            "definition": "label_values(up, namespace)",
            "query": { "query": "label_values(up, namespace)", "refId": "StandardVariableQuery" },
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "hide": 0,
            "refresh": 2,
            "sort": 1,
            "current": {},
            "options": []
