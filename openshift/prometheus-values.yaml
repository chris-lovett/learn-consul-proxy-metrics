# Prometheus Helm Values for OpenShift
# Adapted for ROSA with Consul Enterprise 1.22.6+ent
# Internal access only, with persistent storage option

global:
  scrape_interval: 5s
  scrape_timeout: 3s

server:
  enabled: true
  
  podAnnotations:
    "consul.hashicorp.com/connect-inject": "false"
  
  readinessProbeInitialDelay: 0
  
  # PodSecurity "restricted" compliance
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  
  # Persistent storage for production
  persistentVolume:
    enabled: true
    storageClass: "gp3-csi"  # AWS EBS gp3 for ROSA
    size: 20Gi
    accessModes:
      - ReadWriteOnce
  
  # Resource limits for production
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  
  # Retention for metrics
  retention: "15d"
  
  # Service configuration - ClusterIP for internal access
  service:
    type: ClusterIP
    port: 80
  
  # Scrape configs for Consul metrics
  extraScrapeConfigs: |
    # Scrape Consul servers
    - job_name: 'consul-servers'
      consul_sd_configs:
        - server: 'consul-server.consul.svc.cluster.local:8500'
          datacenter: 'dc1'
          services: ['consul']
      relabel_configs:
        - source_labels: [__meta_consul_service]
          target_label: job
        - source_labels: [__meta_consul_node]
          target_label: instance
      metrics_path: '/v1/agent/metrics'
      params:
        format: ['prometheus']
    
    # Scrape Envoy sidecars via Consul Connect
    - job_name: 'consul-connect-proxies'
      consul_sd_configs:
        - server: 'consul-server.consul.svc.cluster.local:8500'
          datacenter: 'dc1'
      relabel_configs:
        - source_labels: [__meta_consul_service]
          regex: '.*-sidecar-proxy'
          action: keep
        - source_labels: [__meta_consul_service_metadata_envoy_prometheus_bind_addr]
          action: keep
          regex: (.+)
        - source_labels: [__meta_consul_service_metadata_envoy_prometheus_bind_addr]
          target_label: __address__
        - source_labels: [__meta_consul_service]
          target_label: job
        - source_labels: [__meta_consul_node]
          target_label: instance

configmapReload:
  prometheus:
    # PodSecurity "restricted" compliance
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

alertmanager:
  enabled: false

# Node Exporter requires hostNetwork, hostPID, and hostPath volumes which are
# incompatible with the PodSecurity "restricted" profile. OpenShift's built-in
# monitoring stack already ships an equivalent Node Exporter, so disable it here
# to avoid PodSecurity warnings. If you need a standalone node exporter, grant
# its ServiceAccount the "privileged" SCC:
#   oc adm policy add-scc-to-user privileged -z prometheus-node-exporter -n observability
nodeExporter:
  enabled: false

pushgateway:
  enabled: false
  # PodSecurity "restricted" compliance (applies if re-enabled)
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

kube-state-metrics:
  enabled: true
  podAnnotations:
    "consul.hashicorp.com/connect-inject": "false"
  # PodSecurity "restricted" compliance
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

serviceAccounts:
  alertmanager:
    create: false
  nodeExporter:
    create: false
  pushgateway:
    create: false
  server:
    create: true
    annotations: {}

# RBAC for OpenShift
rbac:
  create: true

# Network policy (optional - OpenShift has its own)
networkPolicy:
  enabled: false

