# Grafana Helm Values for OpenShift
# Adapted for ROSA with internal access
# Production-ready with authentication enabled

# Environment variables
env:
  GF_EXPLORE_ENABLED: true
  GF_PANELS_DISABLE_SANITIZE_HTML: true
  GF_LOG_FILTERS: rendering:debug
  GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
  GF_DATE_FORMATS_FULL_DATE: "MMM Do, YYYY hh:mm:ss a"
  GF_DATE_FORMATS_INTERVAL_SECOND: "hh:mm:ss a"
  GF_DATE_FORMATS_INTERVAL_MINUTE: "hh:mm a"
  GF_DATE_FORMATS_INTERVAL_HOUR: "DD/MM hh:mm a"
  GF_DATE_FORMATS_INTERVAL_DAY: "DD/MM"
  GF_DATE_FORMATS_INTERVAL_MONTH: "MM-YYYY"
  GF_DATE_FORMATS_INTERVAL_YEAR: "YYYY"
  # Production: Enable authentication (not anonymous)
  GF_AUTH_ANONYMOUS_ENABLED: false
  # For demo/testing, you can enable anonymous:
  # GF_AUTH_ANONYMOUS_ENABLED: true
  # GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
  # GF_AUTH_DISABLE_LOGIN_FORM: false

# Admin password - change this or use existing secret
adminPassword: "changeme123"
# Or use existing secret:
# admin:
#   existingSecret: "grafana-admin-secret"
#   userKey: admin-user
#   passwordKey: admin-password

# RBAC for OpenShift
rbac:
  create: true
  pspEnabled: false

# Disable test pods
testFramework:
  enabled: false

podLabels:
  app: grafana

podAnnotations:
  "consul.hashicorp.com/connect-inject": "false"

# PodSecurity "restricted" compliance
securityContext:
  runAsNonRoot: true
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Service configuration - ClusterIP for internal access
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations: {}
  labels: {}
  portName: service

# Persistent storage for dashboards and data
persistence:
  enabled: true
  storageClassName: "gp3-csi"  # AWS EBS gp3 for ROSA
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Data sources - Prometheus
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.observability.svc.cluster.local
        access: proxy
        isDefault: true
        editable: true

# Dashboard providers
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'consul-dashboards'
        orgId: 1
        folder: 'Consul'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/consul

# Pre-load Consul dashboards
dashboards:
  consul-dashboards:
    consul-data-plane-health:
      url: https://raw.githubusercontent.com/hashicorp/learn-consul-proxy-metrics/main/dashboards/consul-data-plane-health.json
    consul-data-plane-performance:
      url: https://raw.githubusercontent.com/hashicorp/learn-consul-proxy-metrics/main/dashboards/consul-data-plane-performance.json

# Grafana.ini configuration
grafana.ini:
  server:
    root_url: "%(protocol)s://%(domain)s/"
  analytics:
    check_for_updates: false
  log:
    mode: console
  paths:
    data: /var/lib/grafana/
    logs: /var/log/grafana
    plugins: /var/lib/grafana/plugins
    provisioning: /etc/grafana/provisioning

# Plugins to install
plugins:
  - grafana-piechart-panel

# Sidecar for dynamic dashboard loading (optional)
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    folder: /tmp/dashboards
    defaultFolderName: General
  datasources:
    enabled: true
    label: grafana_datasource

# Image pull policy
image:
  pullPolicy: IfNotPresent

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10

# Made with Bob
