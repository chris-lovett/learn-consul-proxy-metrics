apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

resources:
  - grafanadashboard-consul-data-plane-health.yaml
  - grafanadashboard-consul-data-plane-performance.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: consul-data-plane-health
    files:
      - consul-data-plane-health.json=../../dashboards/consul-data-plane-health.json
  - name: consul-data-plane-performance
    files:
      - consul-data-plane-performance.json=../../dashboards/consul-data-plane-performance.json
