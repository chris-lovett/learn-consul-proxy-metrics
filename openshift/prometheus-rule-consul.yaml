apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: consul-alerts
  namespace: consul
  labels:
    app: consul
spec:
  groups:
  - name: consul
    interval: 30s
    rules:
    - alert: ConsulServiceUnhealthy
      expr: consul_health_service_query{status="critical"} > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Consul service {{ $labels.service_name }} is unhealthy"
        description: "Service {{ $labels.service_name }} has been in critical state for more than 5 minutes"
    
    - alert: ConsulHighErrorRate
      expr: rate(envoy_cluster_upstream_rq{envoy_response_code=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate for {{ $labels.envoy_cluster_name }}"
        description: "Error rate is {{ $value }} for cluster {{ $labels.envoy_cluster_name }}"
    
    - alert: ConsulNoLeader
      expr: consul_raft_leader == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Consul cluster has no leader"
        description: "Consul cluster has been without a leader for more than 1 minute"
    
    - alert: ConsulHighLatency
      expr: histogram_quantile(0.99, rate(envoy_cluster_upstream_rq_time_bucket[5m])) > 1000
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected for {{ $labels.envoy_cluster_name }}"
        description: "P99 latency is {{ $value }}ms for cluster {{ $labels.envoy_cluster_name }}"

